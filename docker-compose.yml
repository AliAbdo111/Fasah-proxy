# Local MongoDB for development — matches default MONGO_URI in .env
# Start: docker compose up -d
# Stop:  docker compose down
services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - fasah_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  fasah_mongo_data:
