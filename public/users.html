<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FASAH Proxy - Users</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { margin-bottom: 8px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    input, button, select, textarea { padding: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    th { background: #f5f5f5; }
    .muted { color: #666; font-size: 12px; }
    .error { color: #b00020; margin: 8px 0; }
    .ok { color: #0b6b2f; margin: 8px 0; }
    .chip { display: inline-block; border: 1px solid #ccc; border-radius: 12px; padding: 2px 8px; margin-right: 4px; font-size: 11px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 12px 0; background: #fafafa; }
    .card h2 { margin: 0 0 8px 0; font-size: 17px; }
    .hidden { display: none; }
    .actions-col { white-space: nowrap; }
    .small-btn { padding: 6px 8px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Users</h1>
  <div class="toolbar">
    <label>Search <input id="q" placeholder="email / username / phone" /></label>
    <label>Page <input id="page" type="number" min="1" value="1" style="width:80px" /></label>
    <label>Limit <input id="limit" type="number" min="1" max="200" value="20" style="width:90px" /></label>
    <button id="openAddBtn">Add User</button>
    <button id="loadBtn">Load</button>
    <button id="logoutBtn">Logout</button>
  </div>
  <div id="meta" class="muted"></div>
  <div id="err" class="error"></div>
  <div id="ok" class="ok"></div>

  <div class="card hidden" id="addCard">
    <h2>Add User</h2>
    <form id="addForm" class="grid">
      <label>Email <input id="addEmail" type="email" required /></label>
      <label>Password <input id="addPassword" type="password" minlength="6" required /></label>
      <label>Username <input id="addUsername" /></label>
      <label>Phone <input id="addPhone" /></label>
      <div>
        <button type="submit">Create User</button>
        <button type="button" id="cancelAddBtn">Cancel</button>
      </div>
    </form>
  </div>

  <div class="card hidden" id="editCard">
    <h2>Edit User</h2>
    <form id="editForm" class="grid">
      <input id="editUserId" type="hidden" />
      <label>Email <input id="editEmail" type="email" /></label>
      <label>Username <input id="editUsername" /></label>
      <label>Phone <input id="editPhone" /></label>
      <label>Active
        <select id="editIsActive">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </label>
      <label>Max Transit / Day <input id="editMaxTransit" type="number" min="0" /></label>
      <label>Max Import / Day <input id="editMaxImport" type="number" min="0" /></label>
      <label style="grid-column: 1 / -1;">
        Features (comma separated, e.g. transit_booking,import_booking)
        <input id="editFeatures" />
      </label>
      <div>
        <button type="submit">Save Changes</button>
        <button type="button" id="cancelEditBtn">Cancel</button>
      </div>
    </form>
    <hr style="margin: 12px 0; border: none; border-top: 1px solid #e5e5e5;" />
    <form id="setPasswordForm" class="grid">
      <label style="grid-column: 1 / -1; font-weight: 700;">Set User Password</label>
      <label>New Password <input id="setPasswordNew" type="password" minlength="6" required /></label>
      <label>Confirm Password <input id="setPasswordConfirm" type="password" minlength="6" required /></label>
      <div>
        <button type="submit">Update Password</button>
      </div>
    </form>
  </div>

  <table>
    <thead>
      <tr>
        <th>Actions</th>
        <th>Email</th>
        <th>Username</th>
        <th>Phone</th>
        <th>Active</th>
        <th>Booking Count</th>
        <th>Total Daily Bookings</th>
        <th>Daily Max Bookings</th>
        <th>Monthly Bookings</th>
        <th>Features</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const token = localStorage.getItem('fasah.authToken');
    const baseUrl = (localStorage.getItem('fasah.baseUrl') || window.location.origin).replace(/\/+$/, '');
    if (!token) {
      window.location.href = '/login.html';
    }

    const usersById = new Map();
    const rows = document.getElementById('rows');
    const err = document.getElementById('err');
    const ok = document.getElementById('ok');
    const meta = document.getElementById('meta');
    const addCard = document.getElementById('addCard');
    const editCard = document.getElementById('editCard');

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showError(message) {
      ok.textContent = '';
      err.textContent = message || '';
    }

    function showOk(message) {
      err.textContent = '';
      ok.textContent = message || '';
    }

    function authHeaders(includeJson) {
      const h = {
        'x-auth-token': token,
        'Authorization': 'Bearer ' + token
      };
      if (includeJson) h['Content-Type'] = 'application/json';
      return h;
    }

    function openEdit(u) {
      addCard.classList.add('hidden');
      document.getElementById('editUserId').value = u._id;
      document.getElementById('editEmail').value = u.email || '';
      document.getElementById('editUsername').value = u.username || '';
      document.getElementById('editPhone').value = u.phone || '';
      document.getElementById('editIsActive').value = String(Boolean(u.isActive));
      document.getElementById('editMaxTransit').value = u.maxTransitBookingCount ?? 0;
      document.getElementById('editMaxImport').value = u.maxImportBookingCount ?? 0;
      document.getElementById('editFeatures').value = Array.isArray(u.features) ? u.features.join(',') : '';
      document.getElementById('setPasswordForm').reset();
      editCard.classList.remove('hidden');
      editCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function loadUsers() {
      showError('');
      rows.innerHTML = '';
      usersById.clear();
      const q = document.getElementById('q').value.trim();
      const page = document.getElementById('page').value || '1';
      const limit = document.getElementById('limit').value || '20';

      const url = new URL(baseUrl + '/api/auth/users');
      url.searchParams.set('page', page);
      url.searchParams.set('limit', limit);
      if (q) url.searchParams.set('q', q);

      try {
        const res = await fetch(url, {
          headers: authHeaders(false)
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Failed to load users');
        }

        meta.textContent = `Page ${data.page} | Limit ${data.limit} | Total ${data.total}`;
        for (const u of data.items || []) {
          usersById.set(u._id, u);
          const features = Array.isArray(u.features) ? u.features : [];
          const chips = features.map((f) => `<span class="chip">${esc(f)}</span>`).join('');
          rows.insertAdjacentHTML('beforeend', `
            <tr>
              <td class="actions-col"><button class="small-btn edit-btn" data-id="${esc(u._id)}">Edit</button></td>
              <td>${esc(u.email)}</td>
              <td>${esc(u.username || '')}</td>
              <td>${esc(u.phone || '')}</td>
              <td>${u.isActive ? 'Yes' : 'No'}</td>
              <td>${u.bookingCount || 0}</td>
              <td>Transit: ${u.transitBookingCount || 0} / Import: ${u.importBookingCount || 0} / Sum: ${u.totalDailyBookings || 0}</td>
              <td>Transit: ${u.maxTransitBookingCount || 0} / Import: ${u.maxImportBookingCount || 0}</td>
              <td>Transit: ${u.totalMonthlyTransitBookingCount || 0} / Import: ${u.totalMonthlyImportBookingCount || 0}</td>
              <td>${chips}</td>
            </tr>
          `);
        }
        document.querySelectorAll('.edit-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            const user = usersById.get(id);
            if (user) openEdit(user);
          });
        });
      } catch (e) {
        showError(e.message || 'Load failed');
      }
    }

    async function addUser(e) {
      e.preventDefault();
      showError('');
      const payload = {
        email: document.getElementById('addEmail').value.trim(),
        password: document.getElementById('addPassword').value,
        username: document.getElementById('addUsername').value.trim(),
        phone: document.getElementById('addPhone').value.trim()
      };
      try {
        const res = await fetch(baseUrl + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || 'Create user failed');
        document.getElementById('addForm').reset();
        addCard.classList.add('hidden');
        showOk('User created successfully.');
        await loadUsers();
      } catch (e2) {
        showError(e2.message || 'Create user failed');
      }
    }

    async function saveEdit(e) {
      e.preventDefault();
      showError('');
      const userId = document.getElementById('editUserId').value;
      if (!userId) return;

      const featuresRaw = document.getElementById('editFeatures').value.trim();
      const payload = {
        email: document.getElementById('editEmail').value.trim(),
        username: document.getElementById('editUsername').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        isActive: document.getElementById('editIsActive').value === 'true',
        maxTransitBookingCount: Number(document.getElementById('editMaxTransit').value || 0),
        maxImportBookingCount: Number(document.getElementById('editMaxImport').value || 0),
        features: featuresRaw ? featuresRaw.split(',').map((x) => x.trim()).filter(Boolean) : []
      };

      try {
        const res = await fetch(baseUrl + '/api/auth/users/' + encodeURIComponent(userId), {
          method: 'PATCH',
          headers: authHeaders(true),
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || 'Update user failed');
        editCard.classList.add('hidden');
        showOk('User updated successfully.');
        await loadUsers();
      } catch (e2) {
        showError(e2.message || 'Update user failed');
      }
    }

    async function setUserPassword(e) {
      e.preventDefault();
      showError('');
      const userId = document.getElementById('editUserId').value;
      if (!userId) return;
      const p1 = document.getElementById('setPasswordNew').value;
      const p2 = document.getElementById('setPasswordConfirm').value;
      if (p1 !== p2) {
        return showError('Password confirmation does not match');
      }
      if (!p1 || String(p1).length < 6) {
        return showError('Password must be at least 6 characters');
      }
      try {
        const res = await fetch(baseUrl + '/api/auth/users/' + encodeURIComponent(userId) + '/password', {
          method: 'PATCH',
          headers: authHeaders(true),
          body: JSON.stringify({ newPassword: p1 })
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || 'Update password failed');
        document.getElementById('setPasswordForm').reset();
        showOk('Password updated successfully.');
      } catch (e2) {
        showError(e2.message || 'Update password failed');
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadUsers);
    document.getElementById('openAddBtn').addEventListener('click', () => {
      editCard.classList.add('hidden');
      addCard.classList.remove('hidden');
      addCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('addEmail').focus();
    });
    document.getElementById('addForm').addEventListener('submit', addUser);
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      addCard.classList.add('hidden');
    });
    document.getElementById('editForm').addEventListener('submit', saveEdit);
    document.getElementById('setPasswordForm').addEventListener('submit', setUserPassword);
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      editCard.classList.add('hidden');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('fasah.authToken');
      window.location.href = '/login.html';
    });

    loadUsers();
  </script>
</body>
</html>
