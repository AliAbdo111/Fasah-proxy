<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FASAH Proxy - Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 24px; margin-bottom: 6px; }
    p { color: #444; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 6px; }
    button { margin-top: 14px; padding: 10px 14px; cursor: pointer; }
    .error { color: #b00020; margin-top: 12px; }
    .ok { color: #0b6b2f; margin-top: 12px; }
    .small { font-size: 12px; color: #666; margin-top: 14px; }
  </style>
</head>
<body>
  <h1>Admin login</h1>
  <p>Only accounts with role <strong>admin</strong> can sign in here. Use <code>/api/auth/login</code> for normal API users.</p>

  <form id="loginForm">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required />

    <button type="submit">Login</button>
  </form>

  <div id="message"></div>
  <div class="small">Token is saved in browser localStorage for the users admin page.</div>

  <script>
    const msg = document.getElementById('message');
    const form = document.getElementById('loginForm');

    function baseUrl() {
      const saved = localStorage.getItem('fasah.baseUrl');
      return (saved || window.location.origin).replace(/\/+$/, '');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = '';

      const origin = baseUrl();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(origin + '/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok || !data.success || !data.token) {
          throw new Error(data.message || 'Login failed');
        }

        localStorage.setItem('fasah.baseUrl', origin);
        localStorage.setItem('fasah.authToken', data.token);
        msg.textContent = 'Login success. Redirecting to users page...';
        msg.className = 'ok';
        setTimeout(() => { window.location.href = '/users.html'; }, 500);
      } catch (err) {
        msg.textContent = err.message || 'Login failed';
        msg.className = 'error';
      }
    });
  </script>
</body>
</html>
