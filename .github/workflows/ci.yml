# Build and sanity checks for Fasah-proxy (Node + npm).
# Runs on main, Omar dev branch, and any branch under dev/ (e.g. dev/feature-x).

name: CI

on:
  push:
    branches:
      - main
      - dev-omar
      - 'dev/**'
  pull_request:
    branches:
      - main
      - dev-omar
      - 'dev/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI checks (syntax + polyfill + mongoose load)
        run: npm run ci

      - name: Block npm package that shadows Node crypto
        run: |
          if [ -f node_modules/crypto/package.json ]; then
            echo 'FATAL: npm package "crypto" must not be installed (shadows Node built-in). Remove it from package.json and run npm uninstall crypto.'
            exit 1
          fi
