# One pipeline: Node build checks on every trigger, then optional SSH deploy to dev.
#
# Repository variables (Actions → Variables):
#   ENABLE_SSH_DEPLOY   `true` to run deploy after CI on pushes to `dev-omar`.
#   DEV_SSH_HOST        hostname or IP
#   DEV_SSH_USER        SSH user (e.g. root)
#   DEV_APP_PATH        app directory on server (leading / optional, e.g. /home/ubuntu/Fasah-proxy-omar)
#   DEV_PM2_APP         optional PM2 app name
#
# Repository secrets (Actions → Secrets) — preferred for password:
#   DEV_SSH_PASSWORD
#
# Fallback: same name as a repository Variable (only if the secret is unset; Variables are visible in the UI).
#
# Dev server: clone repo, `.env` with PORT (see `.env.example`), SSH password auth allowed.

name: CI/CD

on:
  push:
    branches:
      - main
      - dev-omar
      - 'dev/**'
  pull_request:
    branches:
      - main
      - dev-omar
      - 'dev/**'

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI checks (syntax + polyfill + mongoose load)
        run: npm run ci

      - name: Block npm package that shadows Node crypto
        run: |
          if [ -f node_modules/crypto/package.json ]; then
            echo 'FATAL: npm package "crypto" must not be installed (shadows Node built-in). Remove it from package.json and run npm uninstall crypto.'
            exit 1
          fi

  deploy-dev:
    name: Deploy dev (SSH)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev-omar' && vars.ENABLE_SSH_DEPLOY == 'true' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEV_PM2_APP: ${{ vars.DEV_PM2_APP || secrets.DEV_PM2_APP }}
        with:
          host: ${{ vars.DEV_SSH_HOST }}
          username: ${{ vars.DEV_SSH_USER }}
          password: ${{ secrets.DEV_SSH_PASSWORD || vars.DEV_SSH_PASSWORD }}
          script_stop: true
          envs: DEV_PM2_APP
          script: |
            set -euo pipefail
            APP_PATH='${{ vars.DEV_APP_PATH }}'
            case "$APP_PATH" in
              /*) ;;
              *) APP_PATH="/$APP_PATH" ;;
            esac
            cd "$APP_PATH"
            git fetch origin dev-omar
            git checkout dev-omar
            git pull --ff-only origin dev-omar
            npm ci --omit=dev
            if [ -n "$DEV_PM2_APP" ]; then
              pm2 restart "$DEV_PM2_APP" --update-env
            fi
