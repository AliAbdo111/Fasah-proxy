# SSH deploy when pushing to `dev-omar`. Server must already have a clone, `.env` (with PORT), and Node.
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   ENABLE_SSH_DEPLOY   set to `true` to run this job (omit or false to skip).
#
# Repository secrets:
#   DEV_SSH_HOST          hostname or IP
#   DEV_SSH_USER          SSH user
#   DEV_SSH_PASSWORD      SSH password (store only in GitHub Secrets; server must allow password auth)
#   DEV_APP_PATH          absolute path to the app repo on the server (e.g. /home/ubuntu/Fasah-proxy)
#
# Optional secrets:
#   DEV_PM2_APP           if set, runs `pm2 restart "$DEV_PM2_APP" --update-env` after install
#
# On the dev server, set the listen port in `.env`, e.g. PORT=3100 (see `.env.example`).

name: Deploy dev

on:
  push:
    branches:
      - dev-omar

jobs:
  deploy:
    name: SSH pull and install
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SSH_DEPLOY == 'true' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEV_PM2_APP: ${{ secrets.DEV_PM2_APP }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          password: ${{ secrets.DEV_SSH_PASSWORD }}
          script_stop: true
          envs: DEV_PM2_APP
          script: |
            set -euo pipefail
            cd ${{ secrets.DEV_APP_PATH }}
            git fetch origin dev-omar
            git checkout dev-omar
            git pull --ff-only origin dev-omar
            npm install --omit=dev
            if [ -n "$DEV_PM2_APP" ]; then
              pm2 restart "$DEV_PM2_APP" --update-env
            fi
